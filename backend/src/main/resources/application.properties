spring.application.name=url-shortener

# ----- Default profile: H2 in-memory DB, zero setup, perfect for demos/interviews -----
spring.datasource.url=jdbc:h2:mem:urlshortener;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

app.base-url=http://localhost:8080

jwt.secret=${JWT_SECRET:ThisIsADemoSecretKeyForUrlShortenerProject1234567890}
jwt.expiration-ms=86400000

logging.level.com.riya.urlshortener=INFO
